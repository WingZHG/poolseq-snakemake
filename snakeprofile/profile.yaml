executor: slurm

jobname: "{rule}_{wildcards.pool}"

jobs: 200
latency-wait: 60
restart-times: 2

printshellcmds: true
rerun-incomplete: true
keep-going: true
show-failed-logs: true
slurm-keep-successful-logs: true

use-envmodules: true
use-conda: false

default-resources:
  - slurm_account=def-barrett

slurm-output: logs/slurm/%x.%j.out
slurm-error: logs/slurm/%x.%j.err

max-status-checks-per-second: 10