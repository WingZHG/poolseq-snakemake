###########################
##     RESOURCE SETUP    ##
###########################
# Adjust threads to suit your cluster allocation / profile defaults.

set-resources:
  genome_prep:
    threads: 10

  fast_qc:
    threads: 6

  multi_qc:
    threads: 2

  trim_reads:
    threads: 8

  trim_qc:
    threads: 6

  trim_multi_qc:
    threads: 2

  align:
    threads: 24

  sort:
    threads: 2

  rm_dupes:
    threads: 2

  align_stats:
    threads: 2

  mpileup:
    threads: 2

  id_indels:
    threads: 2

  sync:
    threads: 8

  rm_indels:
    threads: 2

  chrom_filter:
    threads: 2

  sync_filter:
    threads: 2

  rename_sync:
    threads: 1

  rename_sync_nf:
    threads: 1

  read_depth:
    threads: 2

  fst_genome:
    threads: 2

  fst_genome_nf:
    threads: 2

  fst_sliding:
    threads: 2

  diversity_genome:
    threads: 2

  diversity_sliding:
    threads: 2


sync_filter:
  min_cov: 10
  max_cov_factor: 2.5
  min_freq: 0.05
